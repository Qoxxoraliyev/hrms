version: "3.9"

services:

  postgres:
    image: postgres:17

    container_name: hrms-postgres

    environment:
      POSTGRES_DB: hrms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1984

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  hrms:
    build: .

    container_name: hrms-app

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hrms_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1984

volumes:
  postgres_data: